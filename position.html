    :root {

        --color-secondary: #b97713;
        --color-accent: #C87E3A;
        --color-bg: #1A1A1A;
        --color-text: #FFFDF5;
        --glass-bg: rgba(200, 126, 58, 0.2);
        --glass-border: rgba(255, 184, 77, 0.4);
        --glass-blur: 10px;
        --shadow-primary: 0 0 20px rgba(255, 198, 92, 0.4);
        --shadow-secondary: 0 0 20px rgba(255, 184, 77, 0.4);
        --shadow-accent: 0 0 20px rgba(200, 126, 58, 0.4);
        --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        --transition-base: all 0.3s ease;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--color-bg);
        color: var(--color-text);
        line-height: 1.6;
        overflow-x: hidden;
        min-height: 100vh;
        background-image:

        background-attachment: fixed;
    }

    main { min-height: calc(100vh - 81px - 200px); }
    img { max-width: 100%; height: auto; }
    a { transition: var(--transition-base); }

    .text-gradient {
        background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;

    /* ====== NAVBAR ====== */

        height: clamp(60px, 8vh, 80px);
        background: rgba(200, 126, 58, 0.95);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--glass-border);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 clamp(15px, 3vw, 40px);
        z-index: 1000; transition: var(--transition-base);
    }
    .navbar-brand {
        display: flex; align-items: center; gap: clamp(8px,1.5vw,12px);
        text-decoration: none; color: var(--color-text);
        font-size: clamp(1.15rem,3vw,2rem); font-weight: 700;
        white-space: nowrap; flex-shrink: 0; z-index: 1001;
        transition: var(--transition-base);
    }
    .navbar-brand:hover { color: var(--color-primary); }
    .navbar-logo { height: clamp(35px,6vh,55px); width: auto; object-fit: contain; transition: var(--transition-base); }
    .navbar-brand:hover .navbar-logo { transform: scale(1.05); }

    .navbar-menu {
        display: flex; list-style: none;
        gap: clamp(15px,2.5vw,25px); margin: 0 0 0 auto; padding: 0; align-items: center;
    }
    .navbar-item { list-style: none; flex-shrink: 0; }
    .navbar-link {
        color: var(--color-text); text-decoration: none;
        font-size: clamp(0.85rem,1.4vw,1rem); font-weight: 500;
        padding: clamp(6px,1vw,10px) clamp(8px,1.5vw,12px);
        border-radius: 8px; position: relative;
        transition: var(--transition-base); display: inline-block; white-space: nowrap;
    }
    .navbar-link::after {
        content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
        width: 0; height: 2px;
        background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
        transition: var(--transition-base);
    }
    .navbar-link:hover { color: #ffe7b9; background: rgba(255,187,0,0.99); box-shadow: var(--shadow-accent); }
    .navbar-link:hover::after { width: 80%; }
    .navbar-link.active-link { color: var(--color-text); background: rgba(131,95,60,0.5); }

    /* Burger */
    #burger { display: none; }
    .burger { position: relative; width: 30px; height: 22.5px; background: transparent; cursor: pointer; display: block; }
    .burger span { display: block; position: absolute; height: 3px; width: 100%; background: #FFFDF5; border-radius: 9px; opacity: 1; left: 0; transform: rotate(0deg); transition: .25s ease-in-out; }
    .burger span:nth-of-type(1) { top: 0px; transform-origin: left center; }
    .burger span:nth-of-type(2) { top: 50%; transform: translateY(-50%); transform-origin: left center; }
    .burger span:nth-of-type(3) { top: 100%; transform-origin: left center; transform: translateY(-100%); }
    #burger:checked + .burger span:nth-of-type(1) { transform: rotate(45deg); top: 0px; left: 5px; }
    #burger:checked + .burger span:nth-of-type(2) { width: 0%; opacity: 0; }
    #burger:checked + .burger span:nth-of-type(3) { transform: rotate(-45deg); top: 21px; left: 5px; }

    @media (max-width: 1399.98px) {
        .burger { display: block; z-index: 2001; }
        .navbar { height: 8vh; }
        .navbar-logo { height: clamp(35px,5vh,45px); }
        .navbar-menu {
            display: none; position: fixed; top: 8vh; right: 20px; width: 250px;
            background: #C87E3AF2; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 15px 0; z-index: 2000; flex-direction: column; gap: 10px;
            animation: slideInFromRight 0.3s ease; list-style-type: none; align-items: flex-start;
        }
        #burger:checked ~ .navbar-menu { display: flex; }
        .navbar-item, .navbar-item-login { list-style: none; padding: 0 10px; width: 100%; }
        .navbar-link { display: flex; align-items: center; color: #fff3e2; gap: 10px; font-size: 1.1rem; font-weight: 600; padding: 8px 12px; border-radius: 6px; width: 100%; }
        .navbar-item-login { border-top: 1.5px solid #e0e0e0; margin-top: 8px; padding-top: 18px; }
        .d-lg-only { display: none !important; }
        .d-lg-none-show { display: block; }
    }
    @media (min-width: 1400px) {
        .burger { display: none !important; }

        .d-lg-none-show { display: none !important; }
    }
    @keyframes slideInFromRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* ====== CARDS ====== */
    .card-glass {
        background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border); border-radius: clamp(15px,2.5vw,20px);
        padding: clamp(15px,3vw,25px); box-shadow: var(--shadow-glass);
        transition: var(--transition-base); position: relative; overflow: hidden;

    /* ====== SECTIONS ====== */
    .section-container { max-width: 1400px; margin: clamp(20px,4vw,30px) auto; padding: 0 clamp(15px,3vw,20px); }

    .map-container { border-radius: 16px; overflow: hidden; margin-top: 12px; }

    /* ====== ORARI TABLE ====== */
    .orari-glass-container {

    .orari-table { width: 100%; min-width: 320px; border-collapse: separate; border-spacing: 0; background: transparent; font-size: clamp(0.85rem,1.8vw,1rem); }
    .orari-table thead tr { background: rgba(255,255,255,0.10); }
    .orari-table th, .orari-table td {

    .orari-table tbody tr { transition: background 0.2s; }
    .orari-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.07); }
    .orari-table tbody tr:nth-child(odd) { background: rgba(255,255,255,0.03); }

    .orari-table tr.oggi-row td:first-child { color: var(--color-primary); font-weight: 700; }

    .orari-badge {

// ===== UTILS =====
function timeToMinutes(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
}

function isOpenNow(orariNegozio) {
    const now = new Date();
    const dow = now.getDay();
    const jsToIdx = [6, 0, 1, 2, 3, 4, 5];
    const idx = jsToIdx[dow];
    const oggi = orariNegozio[idx];
    if (oggi.chiuso) return false;
    const nowMin = now.getHours() * 60 + now.getMinutes();
    if (oggi.mattina) {
        const [am, cm] = [timeToMinutes(oggi.mattina[0]), timeToMinutes(oggi.mattina[1])];
        if (nowMin >= am && nowMin < cm) return true;
    }
    if (oggi.pomeriggio) {
        const [ap, cp] = [timeToMinutes(oggi.pomeriggio[0]), timeToMinutes(oggi.pomeriggio[1])];
        if (nowMin >= ap && nowMin < cp) return true;
    }
    return false;
}

function buildOrariRows(orari) {
    const now = new Date();
    const jsToIdx = [6, 0, 1, 2, 3, 4, 5];
    const idxOggi = jsToIdx[now.getDay()];

    return orari.map((o, idx) => {
        const isOggi = idx === idxOggi;
        let orarioHtml = '';
        if (o.chiuso) {
            orarioHtml = `<span class="orari-chiuso">Chiuso</span>`;
        } else {
            if (o.mattina)     orarioHtml += `<span class="orari-badge">${o.mattina[0]} - ${o.mattina[1]}</span>`;
            if (o.pomeriggio)  orarioHtml += `<span class="orari-badge">${o.pomeriggio[0]} - ${o.pomeriggio[1]}</span>`;
        }
        return `
            <tr${isOggi ? ' class="oggi-row"' : ''}>
                <td>${o.giorno}${isOggi ? ' ◄ Oggi' : ''}</td>
                <td>${orarioHtml}</td>
            </tr>`;
    }).join('');
}

function buildStatoBadge(id, orari) {
    const aperto = isOpenNow(orari);
    return `<span id="stato-negozio-${id}" class="badge fs-6" style="background:${aperto ? '#198754' : '#dc3545'};color:white;padding:6px 14px;border-radius:20px;">
        ${aperto ? '● Aperto' : '● Chiuso'}
    </span>`;
}

function buildTelefonoHtml(telefono) {
    if (!telefono) return '';
    return `
        <div class="mb-4">
            <div class="d-flex align-items-start gap-3">
                <div class="contact-icon-box"><i class="fas fa-phone"></i></div>
                <div class="flex-grow-1">
                    <h4 style="color:var(--color-secondary);font-weight:600;margin-bottom:0;">Telefono</h4>
                    <p style="margin:0;"><a href="tel:${telefono.replace(/\s/g,'')}" style="color:rgba(245,245,245,0.9);text-decoration:none;">${telefono}</a></p>
                </div>
            </div>
        </div>`;
}

                    <div class="mb-4">

                            <div class="flex-grow-1">

                                <p style="color:rgba(245,245,245,0.9);margin:0;">${n.indirizzo}</p>

    </section>
    ${!isLast ? '<hr class="divider-gradient">' : ''}`;
}

// ===== INIT =====
document.addEventListener("DOMContentLoaded", function () {
    // Genera sezioni negozi
    const container = document.getElementById("negozi-container");
    container.innerHTML = negozi.map((n, i) => buildNegozioSection(n, i === negozi.length - 1)).join('');

    // Scroll animations
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (!prefersReducedMotion) {
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) setTimeout(() => e.target.classList.add("animated"), 50); });
        }, { threshold: 0.05, rootMargin: "0px 0px -30px 0px" });
        document.querySelectorAll(".animate-on-scroll").forEach(el => obs.observe(el));
    } else {
        document.querySelectorAll(".animate-on-scroll").forEach(el => { el.style.opacity="1"; el.style.transform="none"; });
    }

    // Mobile menu close on link click
    document.querySelectorAll(".navbar-link").forEach(link => {
        link.addEventListener("click", () => {
            if (window.innerWidth <= 1399) {
                const burger = document.getElementById("burger");
                if (burger) burger.checked = false;
            }
        });
    });
});
